<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0F1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Habbit"/>
<link rel="manifest" href="manifest.json"/>
<title>Habbit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0F1117;
  --bg2:#1A1D2E;
  --bg3:#252840;
  --card:#1E2130;
  --card2:#242740;
  --accent:#4F46E5;
  --accent2:#6366F1;
  --green:#22C55E;
  --green2:#16A34A;
  --red:#EF4444;
  --amber:#F59E0B;
  --text:#F5F4F0;
  --text2:#9CA3AF;
  --text3:#6B7280;
  --border:#2D3148;
  --radius:14px;
  --radius-sm:8px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:16px;line-height:1.5;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}

/* Header */
.header{padding:52px 20px 16px;background:var(--bg);position:relative;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.header h1{font-size:26px;font-weight:700;letter-spacing:-0.5px}
.header h1 span{color:var(--accent2)}
.date-label{font-size:13px;color:var(--text2);margin-top:2px}
.header-actions{display:flex;gap:8px}
.icon-btn{width:38px;height:38px;border-radius:10px;border:none;background:var(--card);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,color .15s}
.icon-btn:active{background:var(--bg3)}
.icon-btn.active{background:var(--accent);color:white}

/* Day tabs */
.day-tabs{padding:0 20px 16px;overflow-x:auto;scrollbar-width:none;display:flex;gap:8px;position:relative;z-index:10}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 12px;border-radius:12px;border:1.5px solid transparent;cursor:pointer;transition:all .15s;background:var(--card);min-width:52px}
.day-tab .day-name{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}
.day-tab .day-num{font-size:18px;font-weight:700;color:var(--text2)}
.day-tab .day-dot{width:5px;height:5px;border-radius:50%;background:transparent}
.day-tab.has-habits .day-dot{background:var(--text3)}
.day-tab.active{background:var(--accent);border-color:var(--accent)}
.day-tab.active .day-name,.day-tab.active .day-num{color:white}
.day-tab.active .day-dot{background:rgba(255,255,255,.5)}
.day-tab.today{border-color:var(--accent2)}
.day-tab.today:not(.active) .day-num{color:var(--accent2)}

/* Scroll area */
.scroll-area{flex:1;overflow-y:auto;padding:0 20px;scrollbar-width:none}
.scroll-area::-webkit-scrollbar{display:none}

/* Section header */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:4px}
.section-title{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
.section-count{font-size:13px;color:var(--text3)}

/* Progress Summary Card */
.summary-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:16px}
.progress-ring-wrap{position:relative;flex-shrink:0}
.progress-ring-wrap svg{transform:rotate(-90deg)}
.progress-ring-wrap .ring-bg{fill:none;stroke:var(--bg3);stroke-width:5}
.progress-ring-wrap .ring-fill{fill:none;stroke:var(--green);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.progress-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.progress-center .pct{font-size:16px;font-weight:700;color:var(--text)}
.progress-center .done{font-size:10px;color:var(--text3);margin-top:-2px}
.summary-info{flex:1;min-width:0}
.summary-info h3{font-size:15px;font-weight:600;margin-bottom:4px}
.summary-info p{font-size:13px;color:var(--text2);line-height:1.4}
.summary-streak{display:flex;align-items:center;gap:6px;margin-top:8px;background:var(--bg3);border-radius:8px;padding:6px 10px;width:fit-content;color:var(--amber)}
.summary-streak span{font-size:12px;font-weight:600;color:var(--amber)}

/* Habit cards */
.habit-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:background .12s,transform .1s;user-select:none;border:1.5px solid transparent;position:relative;overflow:hidden}
.habit-card:active{transform:scale(.985)}
.habit-card.done{border-color:var(--green2);background:linear-gradient(135deg,var(--card) 0%,rgba(34,197,94,.06) 100%)}
.habit-card-top{display:flex;align-items:center;gap:12px}
.habit-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.habit-info{flex:1;min-width:0}
.habit-name{font-size:15px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.habit-detail{font-size:12px;color:var(--text2)}
.habit-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;color:transparent}
.habit-card.done .habit-check{background:var(--green);border-color:var(--green);color:white}

/* Sets tracker */
.sets-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.set-btn{height:30px;min-width:30px;padding:0 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.set-btn.done{background:var(--accent);border-color:var(--accent);color:white}
.set-btn:active{transform:scale(.93)}
.sets-label{font-size:11px;color:var(--text3);margin-top:6px;width:100%}

/* Water tracker */
.water-row{display:flex;gap:5px;margin-top:12px;flex-wrap:wrap}
.water-cup{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg3);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.water-cup.filled{background:rgba(59,130,246,.3);border-color:#3B82F6;color:#3B82F6}
.water-cup:active{transform:scale(.9)}
.water-label{font-size:11px;color:var(--text3);margin-top:6px;width:100%}

/* Quantity tracker */
.qty-row{display:flex;align-items:center;gap:12px;margin-top:10px}
.qty-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.qty-btn:active{transform:scale(.9)}
.qty-display{flex:1;text-align:center}
.qty-current{font-size:22px;font-weight:700}
.qty-target{font-size:12px;color:var(--text3)}
.qty-progress{height:4px;background:var(--bg3);border-radius:2px;margin-top:10px;overflow:hidden}
.qty-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

/* Checkbox only */
.check-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.check-done-badge{font-size:12px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:4px}
.check-pending-badge{font-size:12px;color:var(--text3)}
.cm-icon{display:flex;align-items:center}

/* Streak bar */
.habit-streak{display:flex;gap:3px;margin-top:10px}
.streak-day{width:10px;height:10px;border-radius:3px;background:var(--bg3)}
.streak-day.done{background:var(--accent2)}
.streak-day.today{background:var(--green);border-radius:3px}

/* Empty state */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state .empty-icon{margin-bottom:16px;opacity:.6;color:var(--text3)}
.empty-state h3{font-size:18px;font-weight:600;color:var(--text2);margin-bottom:8px}
.empty-state p{font-size:14px;line-height:1.6}

/* Add habit FAB */
.fab{position:fixed;bottom:calc(80px + var(--safe-bottom));right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:white;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(79,70,229,.4);transition:transform .15s,box-shadow .15s;z-index:50}
.fab:active{transform:scale(.92);box-shadow:0 2px 10px rgba(79,70,229,.3)}

/* Bottom Nav */
.bottom-nav{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + var(--safe-bottom));z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;transition:color .15s}
.nav-item .nav-icon{color:var(--text3);display:flex;align-items:center;justify-content:center}
.nav-item .nav-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.3px}
.nav-item.active .nav-icon,.nav-item.active .nav-label{color:var(--accent2)}

/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:24px 20px calc(24px + var(--safe-bottom));max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal h2{font-size:20px;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;display:block}
.form-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;padding:12px 14px;outline:none;font-family:inherit;transition:border-color .15s;appearance:none}
.form-input:focus{border-color:var(--accent2)}
.form-input option{background:var(--card)}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px}
.emoji-btn{width:44px;height:44px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text2)}
.emoji-btn:hover{border-color:var(--text3)}
.emoji-btn.selected{border-color:var(--accent);background:rgba(79,70,229,.15);color:var(--accent2)}
.type-grid{display:flex;gap:8px;flex-wrap:wrap}
.type-btn{flex:1;min-width:calc(50% - 4px);padding:10px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.type-btn.selected{border-color:var(--accent);background:rgba(79,70,229,.15);color:var(--accent2)}
.day-selector{display:flex;gap:6px;flex-wrap:wrap}
.day-sel-btn{width:40px;height:40px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.day-sel-btn.selected{border-color:var(--accent);background:rgba(79,70,229,.15);color:var(--accent2)}
.color-grid{display:flex;gap:8px;flex-wrap:wrap}
.color-btn{width:36px;height:36px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:16px;color:transparent}
.color-btn.selected{border-color:white;color:white}
.btn-primary{width:100%;padding:14px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:white;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:8px;font-family:inherit}
.btn-primary:active{background:var(--accent2)}
.btn-danger{width:100%;padding:14px;border-radius:var(--radius-sm);border:1.5px solid var(--red);background:transparent;color:var(--red);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;transition:background .15s}
.btn-danger:active{background:rgba(239,68,68,.1)}
.btn-secondary{width:100%;padding:12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;transition:background .15s}
.btn-secondary:active{background:var(--bg3)}

/* Stats page */
.stats-page{flex:1;overflow-y:auto;padding:20px;scrollbar-width:none}
.stats-page::-webkit-scrollbar{display:none}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px}
.stat-card .stat-val{font-size:28px;font-weight:700;margin-bottom:2px}
.stat-card .stat-lbl{font-size:12px;color:var(--text2)}
.stat-card.accent .stat-val{color:var(--accent2)}
.stat-card.green .stat-val{color:var(--green)}
.stat-card.amber .stat-val{color:var(--amber)}
.week-chart{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.week-chart h3{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.week-bars{display:flex;align-items:flex-end;gap:6px;height:120px}
.week-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;gap:4px}
.week-bar-col.today .week-bar-label{color:var(--accent2);font-weight:700}
.week-bar-pct{font-size:10px;color:var(--text3);font-weight:600;min-height:14px}
.week-bar-track{flex:1;width:100%;background:var(--bg3);border-radius:4px;position:relative;overflow:hidden;display:flex;align-items:flex-end}
.week-bar-fill{width:100%;border-radius:4px;transition:height .5s cubic-bezier(.4,0,.2,1);min-height:0}
.week-bar-label{font-size:11px;color:var(--text3);font-weight:600}
.habit-stats-list{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.habit-stats-list h3{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.habit-stat-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.habit-stat-row:last-child{margin-bottom:0}
.habit-stat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.habit-stat-info{flex:1;min-width:0}
.habit-stat-name{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.habit-stat-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.habit-stat-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.habit-stat-pct{font-size:12px;color:var(--text2);flex-shrink:0}

/* Settings page */
.settings-page{flex:1;overflow-y:auto;padding:20px;scrollbar-width:none}
.settings-page::-webkit-scrollbar{display:none}
.settings-section{margin-bottom:20px}
.settings-section-title{font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;padding-left:4px}
.settings-card{background:var(--card);border-radius:var(--radius);overflow:hidden}
.settings-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.settings-row:last-child{border-bottom:none}
.settings-row:active{background:var(--bg3)}
.settings-row .row-icon{width:28px;text-align:center;color:var(--text2);display:flex;align-items:center;justify-content:center}
.settings-row .row-text{flex:1}
.settings-row .row-title{font-size:14px;font-weight:500}
.settings-row .row-sub{font-size:12px;color:var(--text3);margin-top:1px}
.settings-row .row-chevron{color:var(--text3);display:flex;align-items:center}
.toggle-switch{width:44px;height:26px;background:var(--bg3);border-radius:13px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.toggle-switch.on{background:var(--accent)}
.toggle-switch::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:white;transition:transform .2s}
.toggle-switch.on::after{transform:translateX(18px)}

/* Toast */
.toast{position:fixed;top:calc(20px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card2);color:var(--text);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;border:1px solid var(--border);transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green2)}
.toast.error{border-color:var(--red)}

/* Swipe to delete */
.habit-card-wrap{position:relative;overflow:hidden;border-radius:var(--radius);margin-bottom:10px}
.habit-card-wrap .delete-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:var(--red);display:flex;align-items:center;justify-content:center;border-radius:var(--radius);cursor:pointer;color:white}
.habit-card-wrap .delete-bg:active{background:#dc2626}
.habit-card-wrap .habit-card{margin-bottom:0;border-radius:var(--radius);position:relative;z-index:1;transition:transform .25s cubic-bezier(.4,0,.2,1),background .12s,border-color .15s}
.habit-card-wrap.swiping .habit-card{transition:none}

/* Context menu */
.context-menu{position:fixed;z-index:300;background:var(--card2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:6px;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;transform:scale(.9);pointer-events:none;transition:opacity .15s,transform .15s}
.context-menu.open{opacity:1;transform:scale(1);pointer-events:all}
.context-menu-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text);transition:background .1s}
.context-menu-item:active{background:var(--bg3)}
.context-menu-item.danger{color:var(--red)}
.context-menu-item .cm-icon{font-size:16px;width:20px;text-align:center}
.context-menu-sep{height:1px;background:var(--border);margin:4px 8px}

/* Page transitions */
.page{display:none;flex:1;flex-direction:column;overflow:hidden}
.page.active{display:flex}

/* Confetti */
@keyframes confetti-fall{
  0%{transform:translateY(-10px) rotate(0);opacity:1}
  100%{transform:translateY(300px) rotate(720deg);opacity:0}
}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:9999;animation:confetti-fall 1.2s ease-in forwards}

/* Pull down header bg */
.day-progress-bar{height:3px;background:var(--bg3);margin:0 20px;border-radius:2px;margin-bottom:8px;overflow:hidden}
.day-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* SVG Icons */
.svg-icon{width:1em;height:1em;vertical-align:-.125em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:inline-block}
.svg-icon.sm{width:.875em;height:.875em}
.svg-icon.lg{width:1.25em;height:1.25em}
.svg-icon.xl{width:1.5em;height:1.5em}
.icon-btn .svg-icon,.nav-icon .svg-icon,.row-icon .svg-icon,.cm-icon .svg-icon,.habit-icon .svg-icon,.habit-stat-icon .svg-icon,.empty-icon .svg-icon,.summary-streak .svg-icon{width:1em;height:1em}

/* Fullscreen */
html:fullscreen{background:var(--bg)}
html:fullscreen body{overflow:hidden}
#app:fullscreen{max-width:100%;height:100%;height:100dvh}

/* XP & Level */
.xp-bar-wrap{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}
.xp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.xp-level{font-size:14px;font-weight:700;color:var(--accent2)}
.xp-amount{font-size:12px;color:var(--text3)}
.xp-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.xp-next{font-size:11px;color:var(--text3);margin-top:6px}

/* Badges */
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.badge-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:var(--radius-sm);background:var(--bg3);transition:all .2s;position:relative}
.badge-item.unlocked{background:rgba(79,70,229,.12);border:1.5px solid rgba(79,70,229,.3)}
.badge-item.locked{opacity:.4;filter:grayscale(1)}
.badge-item .badge-icon{font-size:24px;line-height:1;display:flex;align-items:center;justify-content:center}
.badge-item .badge-name{font-size:10px;font-weight:600;color:var(--text2);text-align:center;line-height:1.2}
.badge-item.unlocked .badge-name{color:var(--accent2)}
.badge-lock-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2);border-radius:var(--radius-sm);color:var(--text3)}
@keyframes badge-glow{0%,100%{box-shadow:0 0 0 0 rgba(79,70,229,.4)}50%{box-shadow:0 0 12px 4px rgba(79,70,229,.3)}}
.badge-item.just-unlocked{animation:badge-glow 1s ease 2}

/* Daily XP */
.daily-xp{display:flex;align-items:center;gap:8px;margin-top:8px}
.daily-xp-label{font-size:11px;color:var(--text3);white-space:nowrap}
.daily-xp-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.daily-xp-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s}
.daily-xp-val{font-size:11px;font-weight:600;color:var(--green);white-space:nowrap}

/* Stats day navigator */
.stats-day-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px}
.stats-day-nav .day-nav-btn{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.stats-day-nav .day-nav-btn:active{transform:scale(.9);background:var(--bg3)}
.stats-day-nav .day-nav-btn.flip{transform:scaleX(-1)}
.stats-day-nav .day-nav-btn.flip:active{transform:scale(.9) scaleX(-1)}
.stats-day-nav .day-nav-label{font-size:14px;font-weight:600;color:var(--text);min-width:120px;text-align:center}
.stats-day-nav .day-nav-label small{font-size:11px;color:var(--text3);font-weight:400;display:block;margin-top:1px}
</style>
</head>

  </div>

    </div>
    <div id="habits-list"></div>
  </div>
  <button class="fab" onclick="openAddModal()">+</button>

<!-- STATS PAGE -->

    <div class="header-top">
      <div><h1>Stats</h1><div class="date-label">Diese Woche</div></div>
    </div>
  </div>
  <div class="stats-page" id="stats-content"></div>
</div>

    </div>
  </div>

</div>

  <div class="nav-item" onclick="showPage('stats',this)">
    <div class="nav-icon"><svg class="svg-icon"><use href="#ic-bar-chart"/></svg></div>
    <div class="nav-label">Stats</div>

    <div class="nav-label">Einstellungen</div>
  </div>
</nav>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="habit-modal" onclick="handleModalClick(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-handle"></div>
    <h2 id="modal-title">Habit hinzufügen</h2>

    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="f-name" type="text" placeholder="z.B. Wall Pushups" maxlength="40"/>
    </div>

    <div class="form-group">
      <label class="form-label">Icon</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Farbe</label>
      <div class="color-grid" id="color-grid"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Typ</label>
      <div class="type-grid">
        <div class="type-btn selected" onclick="selectType('sets',this)"><svg class="svg-icon sm"><use href="#ic-dumbbell"/></svg> Sets</div>
        <div class="type-btn" onclick="selectType('quantity',this)"><svg class="svg-icon sm"><use href="#ic-bar-chart"/></svg> Menge</div>
        <div class="type-btn" onclick="selectType('water',this)"><svg class="svg-icon sm"><use href="#ic-droplets"/></svg> Wasser</div>
        <div class="type-btn" onclick="selectType('check',this)"><svg class="svg-icon sm"><use href="#ic-check"/></svg> Check</div>
      </div>
    </div>

    <div id="type-config"></div>

    <div class="form-group">
      <label class="form-label">Tage</label>
      <div class="day-selector" id="day-selector"></div>
    </div>

    <button class="btn-primary" onclick="saveHabit()" id="save-btn">Speichern</button>
    <button class="btn-secondary" onclick="closeModal()" id="cancel-btn">Abbrechen</button>
    <button class="btn-danger" onclick="deleteHabit()" id="delete-btn" style="display:none">Habit löschen</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Context Menu -->
<div class="context-menu" id="context-menu">
  <div class="context-menu-item" onclick="contextEdit()"><span class="cm-icon"><svg class="svg-icon sm"><use href="#ic-pencil"/></svg></span>Bearbeiten</div>
  <div class="context-menu-sep"></div>
  <div class="context-menu-item danger" onclick="contextDelete()"><span class="cm-icon"><svg class="svg-icon sm"><use href="#ic-trash"/></svg></span>Löschen</div>
</div>

function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function dateStr(offset=0){const d=new Date();d.setDate(d.getDate()+offset);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function getDayOfWeek(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  return (d.getDay()+6)%7; // 0=Mo..6=So
}

function loadData(){
  try{return JSON.parse(localStorage.getItem('habbit_data')||'{}')}catch{return {}}
}
function saveData(d){localStorage.setItem('habbit_data',JSON.stringify(d))}
function getData(){
  let d=loadData();
  if(!d.habits)d.habits=[];
  if(!d.completions)d.completions={};
  if(!d.sets)d.sets={};
  if(!d.qty)d.qty={};
  if(!d.water)d.water={};
  if(!d.settings)d.settings={notifications:false,weekStart:0,darkMode:true};
  if(!d.xp)d.xp=0;
  if(!d.badges)d.badges=[];
  if(!d.dailyXp)d.dailyXp={};
  return d;
}

// ─── GAMIFICATION ────────────────────────────────────────────────────────────
function calcLevel(xp){return Math.floor(Math.sqrt(xp/50))}
function xpForNextLevel(level){return (level+1)*(level+1)*50}
function xpForLevel(level){return level*level*50}

function awardXp(d, amount, label){
  const today=todayStr();
  const oldLevel=calcLevel(d.xp);
  d.xp+=amount;
  d.dailyXp[today]=(d.dailyXp[today]||0)+amount;
  const newLevel=calcLevel(d.xp);
  saveData(d);
  if(newLevel>oldLevel){
    showToast(`Level ${newLevel}!`,'success');
    spawnConfetti();
  } else {
    showToast(`+${amount} XP · ${label||''}`);
  }
  checkBadges(d);
}

function checkBadges(d){
  const newBadges=[];
  const s=d=>{if(!d.badges.includes(s)){d.badges.push(s);newBadges.push(s);}};
  const streak=getStreak(d);
  const totalCompletions=countTotalCompletions(d);

  if(d.habits.length>=1)s('first_habit');
  if(totalCompletions>=1)s('first_done');
  if(streak>=3)s('streak_3');
  if(streak>=7)s('streak_7');
  if(streak>=14)s('streak_14');
  if(streak>=30)s('streak_30');
  if(d.habits.length>=5)s('habits_5');
  if(totalCompletions>=100)s('completions_100');
  if(totalCompletions>=500)s('completions_500');
  if(totalCompletions>=1000)s('completions_1000');
  if(calcLevel(d.xp)>=10)s('level_10');
  if(calcLevel(d.xp)>=25)s('level_25');
  if(d.xp>=10000)s('xp_10000');
  if(d.badges.length>=10)s('badge_master');

  // Check perfect day
  const today=todayStr();
  const tdow=getDayOfWeek(today);
  const dayHabits=d.habits.filter(h=>h.days.includes(tdow));
  if(dayHabits.length>0 && dayHabits.every(h=>isCompleted(h,today,d))){
    s('perfect_day');
  }
  // Check perfect week (7 consecutive perfect days)
  let perfectDays=0;
  for(let i=0;i<7;i++){
    const off=i-getDayOfWeek(todayStr());
    const ds=dateStr_(off);
    const dow=(getDayOfWeek(todayStr())+i)%7;
    const dh=d.habits.filter(h=>h.days.includes(dow));
    if(dh.length>0 && dh.every(h=>isCompleted(h,ds,d))) perfectDays++;
  }
  if(perfectDays>=7) s('perfect_week');

  if(newBadges.length>0){
    saveData(d);
    newBadges.forEach(b=>{
      const badge=BADGES[b];
      if(badge) setTimeout(()=>showToast(`Badge: ${badge.name}!`,'success'),300);
    });
    spawnConfetti();
  }
}

function renderXpBar(d){
  const level=calcLevel(d.xp);
  const currentXp=d.xp-xpForLevel(level);
  const needed=xpForNextLevel(level)-xpForLevel(level);
  const pct=needed>0?Math.min(100,Math.round(currentXp/needed*100)):0;
  const today=todayStr();
  const dailyXp=d.dailyXp[today]||0;
  return `<div class="xp-bar-wrap">
    <div class="xp-top">
      <span class="xp-level">Level ${level}</span>
      <span class="xp-amount">${d.xp.toLocaleString()} XP</span>
    </div>
    <div class="xp-bar"><div class="xp-bar-fill" style="width:${pct}%"></div></div>
    <div class="xp-next">Nächstes Level: ${needed-currentXp} XP übrig</div>
    <div class="daily-xp">
      <span class="daily-xp-label">Heute:</span>
      <div class="daily-xp-bar"><div class="daily-xp-fill" style="width:${Math.min(100,dailyXp/100*100)}%"></div></div>
      <span class="daily-xp-val">+${dailyXp} XP</span>
    </div>
  </div>`;
}

function init(){
  buildDayTabs();
  renderHome();
  renderSettings();
  // Auto fullscreen
  setTimeout(()=>goFullscreen(),300);
  // Service Worker with update check
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').then(reg=>{
      // Check for updates every 60 minutes
      setInterval(()=>reg.update(),3600000);
      // When new SW is installing
      reg.addEventListener('updatefound',()=>{
        const newSW=reg.installing;
        if(!newSW)return;
        newSW.addEventListener('statechange',()=>{
          if(newSW.state==='installed'&&navigator.serviceWorker.controller){
            showUpdateToast();
          }
        });
      });
    }).catch(()=>{});
  }
}

function showUpdateToast(){
  const t=document.getElementById('toast');
  t.innerHTML=`Update verfügbar! <button onclick="location.reload()" style="background:var(--accent);color:white;border:none;border-radius:6px;padding:4px 10px;margin-left:8px;font-size:12px;font-weight:600;cursor:pointer">Neu laden</button>`;
  t.className='toast success show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),8000);
}

function buildDayTabs(){
  const tabs = document.getElementById('day-tabs');
  const today = getDayOfWeek(todayStr());
  const d = getData();
  tabs.innerHTML = '';
  for(let i=0;i<7;i++){
    const hasHabits = d.habits.some(h=>h.days.includes(i));
    const div = document.createElement('div');
    div.className = 'day-tab'+(i===today?' today':'')+(i===selectedDay?' active':'')+(hasHabits?' has-habits':'');
    div.onclick = ()=>selectDay(i);
    const dateOffset = i - today;
    const dateForDay = dateStr(dateOffset);
    const dd = new Date(dateForDay+'T12:00:00').getDate();
    div.innerHTML = `<span class="day-name">${DAYS_SHORT[i]}</span><span class="day-num">${dd}</span><span class="day-dot"></span>`;
    tabs.appendChild(div);
  }
}

function selectDay(i){
  selectedDay = i;
  buildDayTabs();
  renderHome();
}

function renderHome(){
  const today = getDayOfWeek(todayStr());
  const dateOffset = selectedDay - today;
  const currentDateStr = dateStr(dateOffset);
  const d = getData();
  
  // Date label
  const dateObj = new Date(currentDateStr+'T12:00:00');
  const opts = {weekday:'long',day:'numeric',month:'long'};
  document.getElementById('current-date-label').textContent = dateObj.toLocaleDateString('de-AT',opts);
  document.getElementById('section-title-today').textContent = selectedDay===today?'Heute':DAYS_FULL[selectedDay];

  // Filter habits for this day
  let habits = d.habits.filter(h=>h.days.includes(selectedDay));
  
  // Sort
  if(sortMode===1){
    habits = habits.sort((a,b)=>{
      const da=isCompleted(a,currentDateStr,d);
      const db=isCompleted(b,currentDateStr,d);
      return da-db;
    });
  } else if(sortMode===2){
    habits = habits.sort((a,b)=>a.name.localeCompare(b.name));
  }
  
  // Filter pending
  if(showOnlyPending) habits = habits.filter(h=>!isCompleted(h,currentDateStr,d));

  const total = d.habits.filter(h=>h.days.includes(selectedDay)).length;
  const done = d.habits.filter(h=>h.days.includes(selectedDay)&&isCompleted(h,currentDateStr,d)).length;
  const pct = total>0?Math.round(done/total*100):0;

  // Perfect day bonus
  if(pct===100 && total>0 && selectedDay===getDayOfWeek(todayStr())){
    const todayKey='perfect_'+todayStr();
    if(!d._perfectAwarded) d._perfectAwarded={};
    if(!d._perfectAwarded[todayKey]){
      d._perfectAwarded[todayKey]=true;
      awardXp(d,25,'Perfekter Tag!');
    }
  }

  document.getElementById('section-count').textContent = `${done}/${total}`;
  document.getElementById('day-progress-fill').style.width = pct+'%';

  // Summary
  const summArea = document.getElementById('summary-area');
  const streak = getStreak(d);
  const circumference = 2*Math.PI*28;
  const offset = circumference - (pct/100)*circumference;
  summArea.innerHTML = renderXpBar(d) + `<div class="summary-card">
    <div class="progress-ring-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle class="ring-bg" cx="36" cy="36" r="28"/>
        <circle class="ring-fill" cx="36" cy="36" r="28" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" id="main-ring"/>
      </svg>
      <div class="progress-center"><div class="pct">${pct}%</div><div class="done">${done}/${total}</div></div>
    </div>
    <div class="summary-info">
      <h3>${pct===100&&total>0?'Perfekt!':pct>50?'Gut dabei!':'Los geht\'s!'}</h3>
      <p style="font-size:13px;color:var(--text2)">${total===0?'Noch keine Habits für diesen Tag.':pct===100?'Alle Habits erledigt!':total-done+' Habit'+(total-done!==1?'s':'')+' noch offen'}</p>
      ${streak>0?`<div class="summary-streak">${svgIcon('flame','sm')}<span>${streak} Tag${streak!==1?'e':''} Streak</span></div>`:''}
    </div>
  </div>`;

  // Habits list
  const list = document.getElementById('habits-list');
  if(habits.length===0){
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${svgIcon(total===0?'clipboard':'target','xl')}</div>
      <h3>${total===0?'Keine Habits':'Alle erledigt!'}</h3>
      <p>${total===0?'Tippe auf + um deinen ersten Habit für '+DAYS_FULL[selectedDay]+' hinzuzufügen.':showOnlyPending?'Alle offenen Habits sind fertig!':''}</p>
    </div>`;
    return;
  }
  list.innerHTML = '';
  habits.forEach(h=>list.appendChild(buildHabitCard(h,currentDateStr,d)));
}

function isCompleted(habit, dateStr, d){
  if(habit.type==='check') return !!(d.completions[dateStr]&&d.completions[dateStr][habit.id]);
  if(habit.type==='sets'){
    const key=`${dateStr}_${habit.id}`;
    const done=(d.sets[key]||[]).filter(Boolean).length;
    return done>=habit.sets;
  }
  if(habit.type==='quantity'){
    const key=`${dateStr}_${habit.id}`;
    return (d.qty[key]||0)>=(habit.target||1);
  }
  if(habit.type==='water'){
    const key=`${dateStr}_${habit.id}`;
    return (d.water[key]||0)>=(habit.cups||8);
  }
  return false;
}

function buildHabitCard(habit, dateStr, d){
  const wrap = document.createElement('div');
  wrap.className = 'habit-card-wrap';
  const done = isCompleted(habit, dateStr, d);
  
  // Delete background (swipe target)
  const deleteBg = document.createElement('div');
  deleteBg.className = 'delete-bg';
  deleteBg.innerHTML = svgIcon('trash');
  deleteBg.onclick = (e)=>{
    e.stopPropagation();
    contextHabitId = habit.id;
    contextDelete();
  };
  wrap.appendChild(deleteBg);

  const card = document.createElement('div');
  card.className = 'habit-card'+(done?' done':'');
  card.dataset.id = habit.id;
  card.onclick = ()=>{if(!didSwipe&&!contextMenuOpen&&!longPressFired)handleCardClick(habit,dateStr)};

  // Swipe-to-delete + Long-press (unified touch handling)
  let startX=0, startY=0, currentX=0, swiping=false, pressTimer=null, touchMoved=false, didSwipe=false, longPressFired=false;
  card.addEventListener('touchstart',(e)=>{
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    currentX=startX;
    swiping=false;
    touchMoved=false;
    didSwipe=false;
    longPressFired=false;
    wrap.classList.remove('swiping');
    pressTimer=setTimeout(()=>{longPressFired=true;openContextMenu(null,habit.id,card)},500);
  },{passive:true});
  card.addEventListener('touchmove',(e)=>{
    currentX=e.touches[0].clientX;
    const curY=e.touches[0].clientY;
    const diffX=startX-currentX;
    const diffY=Math.abs(startY-curY);
    if(diffX>10||diffY>10) touchMoved=true;
    if(diffX>15){
      swiping=true;
      didSwipe=true;
      clearTimeout(pressTimer);
      wrap.classList.add('swiping');
      const offset=Math.min(diffX,80);
      card.style.transform=`translateX(-${offset}px)`;
    }
  },{passive:true});
  card.addEventListener('touchend',()=>{
    clearTimeout(pressTimer);
    const diff=startX-currentX;
    if(swiping&&diff>50){
      card.style.transform='translateX(-80px)';
    } else {
      card.style.transform='';
    }
    wrap.classList.remove('swiping');
    swiping=false;
    // Prevent click after swipe
    if(didSwipe){
      setTimeout(()=>{didSwipe=false},10);
      return;
    }
  });

  // Context menu on right-click
  card.oncontextmenu = (e)=>{
    e.preventDefault();
    e.stopPropagation();
    openContextMenu(e, habit.id);
  };

  // Top row
  let topHTML = `<div class="habit-card-top">
    <div class="habit-icon" style="background:${habit.color}22;color:${habit.color}">${svgIcon(habit.emoji)}</div>
    <div class="habit-info">
      <div class="habit-name">${habit.name}</div>
      <div class="habit-detail">${getHabitDetail(habit)}</div>
    </div>
    <div class="habit-check">${done?svgIcon('check'):''}</div>
  </div>`;

  // Type-specific controls
  let controlHTML = '';
  if(habit.type==='sets'){
    const key=`${dateStr}_${habit.id}`;
    const doneArr=d.sets[key]||Array(habit.sets).fill(false);
    const sets=habit.sets||3;
    let btns='';
    for(let i=0;i<sets;i++){
      btns+=`<div class="set-btn${doneArr[i]?' done':''}" onclick="event.stopPropagation();toggleSet('${habit.id}','${dateStr}',${i})">${doneArr[i]?svgIcon('check','sm'):i+1}</div>`;
    }
    const doneCount=doneArr.filter(Boolean).length;
    let setsLabel = `${doneCount}/${sets} Sets · ${habit.reps||10} Wdh.`;
    if(habit.weight) setsLabel += ` · ${habit.weight}kg`;
    controlHTML=`<div class="sets-row">${btns}</div><div class="sets-label">${setsLabel}</div>`;
  } else if(habit.type==='water'){
    const key=`${dateStr}_${habit.id}`;
    const cups=d.water[key]||0;
    const total=habit.cups||8;
    let watBtns='';
    for(let i=0;i<total;i++){
      watBtns+=`<div class="water-cup${i<cups?' filled':''}" onclick="event.stopPropagation();toggleWater('${habit.id}','${dateStr}',${i})">${svgIcon('droplets','sm')}</div>`;
    }
    const liters=(cups*(habit.mlPerCup||250)/1000).toFixed(1);
    controlHTML=`<div class="water-row">${watBtns}</div><div class="water-label">${cups}/${total} Gläser · ${liters}L</div>`;
  } else if(habit.type==='quantity'){
    const key=`${dateStr}_${habit.id}`;
    const current=d.qty[key]||0;
    const target=habit.target||1;
    const pct=Math.min(100,Math.round(current/target*100));
    controlHTML=`<div class="qty-row">
      <button class="qty-btn" onclick="event.stopPropagation();changeQty('${habit.id}','${dateStr}',-${habit.step||1})">${svgIcon('minus')}</button>
      <div class="qty-display"><div class="qty-current">${current}</div><div class="qty-target">Ziel: ${target} ${habit.unit||''}</div></div>
      <button class="qty-btn" onclick="event.stopPropagation();changeQty('${habit.id}','${dateStr}',${habit.step||1})">${svgIcon('plus')}</button>
    </div>
    <div class="qty-progress"><div class="qty-progress-fill" style="width:${pct}%;background:${habit.color||'var(--accent)'}"></div></div>`;
  } else {
    controlHTML = done
      ? `<div class="check-row"><div class="check-done-badge">${svgIcon('check','sm')} Erledigt</div></div>`
      : `<div class="check-row"><div class="check-pending-badge">Tippe zum Abhaken</div></div>`;
  }

  // Streak dots (last 7 days)
  const today = getDayOfWeek(todayStr());
  let streakDots = '<div class="habit-streak">';
  for(let i=6;i>=0;i--){
    const dayOff = selectedDay - today - i;
    const ds = dateStr_(dayOff);
    const isDone = isCompleted(habit, ds, d);
    const isToday = i===0&&selectedDay===today;
    streakDots += `<div class="streak-day${isDone?' done':''}${isToday?' today':''}"></div>`;
  }
  streakDots += '</div>';

  card.innerHTML = topHTML + controlHTML + streakDots;

  wrap.appendChild(card);
  return wrap;
}

function dateStr_(offset){
  const d=new Date();
  d.setDate(d.getDate()+offset);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getHabitDetail(h){
  if(h.type==='sets'){
    let detail = `${h.reps||10} × ${h.sets||3} Sets`;
    if(h.weight) detail += ` · ${h.weight}kg`;
    if(h.pause) detail += ` · ${h.pause}s Pause`;
    return detail;
  }
  if(h.type==='water'){
    let detail = `${h.cups||8} Gläser · ${((h.cups||8)*(h.mlPerCup||250)/1000).toFixed(1)}L`;
    if(h.remindMin) detail += ` · alle ${h.remindMin}min`;
    return detail;
  }
  if(h.type==='quantity') return `Ziel: ${h.target} ${h.unit||''}`;
  return h.note||'Check';
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function handleCardClick(habit, ds){
  if(habit.type==='check'){
    toggleCheck(habit.id, ds);
  } else {
    openEditModal(habit.id);
  }
}

function toggleCheck(id, ds){
  const d=getData();
  if(!d.completions[ds])d.completions[ds]={};
  const prev=d.completions[ds][id]||false;
  d.completions[ds][id]=!prev;
  saveData(d);
  if(!prev) triggerComplete(id);
  renderHome();
}

function toggleSet(id, ds, idx){
  const d=getData();
  const key=`${ds}_${id}`;
  if(!d.sets[key]){
    const h=d.habits.find(h=>h.id===id);
    d.sets[key]=Array(h.sets||3).fill(false);
  }
  d.sets[key][idx]=!d.sets[key][idx];
  saveData(d);
  const habit=d.habits.find(h=>h.id===id);
  const allDone=d.sets[key].every(Boolean);
  if(allDone) triggerComplete(id);
  renderHome();
}

function toggleWater(id, ds, idx){
  const d=getData();
  const key=`${ds}_${id}`;
  const current=d.water[key]||0;
  d.water[key]=idx<current?idx:idx+1;
  saveData(d);
  const habit=d.habits.find(h=>h.id===id);
  if(d.water[key]>=(habit.cups||8)) triggerComplete(id);
  renderHome();
}

function changeQty(id, ds, delta){
  const d=getData();
  const key=`${ds}_${id}`;
  const habit=d.habits.find(h=>h.id===id);
  const current=d.qty[key]||0;
  const target=habit.target||1;
  d.qty[key]=Math.max(0,current+delta);
  saveData(d);
  if(d.qty[key]>=target&&current<target) triggerComplete(id);
  renderHome();
}

function triggerComplete(id){
  const d=getData();
  const habit=d.habits.find(h=>h.id===id);
  let xp=10;
  if(habit){
    if(habit.type==='sets') xp=15;
    else if(habit.type==='quantity') xp=20;
    else if(habit.type==='water') xp=15;
  }
  // Streak bonus
  const streak=getStreak(d);
  xp+=streak*5;
  awardXp(d,xp,'Habit erledigt');
  spawnConfetti();
}

function openContextMenu(e, habitId, cardEl){
  contextHabitId = habitId;
  const menu = document.getElementById('context-menu');
  
  // Position the menu
  let x, y;
  if(e){
    x = e.clientX || e.pageX;
    y = e.clientY || e.pageY;
  } else if(cardEl){
    const rect = cardEl.getBoundingClientRect();
    x = rect.left + rect.width/2;
    y = rect.top + 40;
  } else {
    x = window.innerWidth/2;
    y = window.innerHeight/2;
  }
  
  // Keep menu in viewport
  const menuW = 160, menuH = 100;
  if(x + menuW > window.innerWidth) x = window.innerWidth - menuW - 8;
  if(y + menuH > window.innerHeight) y = y - menuH - 20;
  if(x < 8) x = 8;
  if(y < 8) y = 8;
  
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.classList.add('open');
  contextMenuOpen = true;
  
  // Close on click outside (delayed to avoid immediate close from triggering click)
  setTimeout(()=>{
    document.addEventListener('click', closeContextMenu, {once:true});
    document.addEventListener('contextmenu', closeContextMenu, {once:true});
  },100);
}

function closeContextMenu(){
  document.getElementById('context-menu').classList.remove('open');
  contextMenuOpen = false;
}

function contextEdit(){
  closeContextMenu();
  if(contextHabitId) openEditModal(contextHabitId);
}

function contextDelete(){
  closeContextMenu();
  if(!contextHabitId) return;
  const d = getData();
  const h = d.habits.find(h=>h.id===contextHabitId);
  if(!h) return;
  if(!confirm(`"${h.name}" wirklich löschen?`)) return;
  d.habits = d.habits.filter(h=>h.id!==contextHabitId);
  Object.keys(d.completions).forEach(ds=>{delete d.completions[ds][contextHabitId]});
  Object.keys(d.sets).forEach(k=>{if(k.includes(contextHabitId))delete d.sets[k]});
  Object.keys(d.qty).forEach(k=>{if(k.includes(contextHabitId))delete d.qty[k]});
  Object.keys(d.water).forEach(k=>{if(k.includes(contextHabitId))delete d.water[k]});
  saveData(d);
  buildDayTabs();
  renderHome();
  showToast('Habit gelöscht');
}

function saveHabit(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){showToast('Bitte gib einen Namen ein','error');return;}
  if(selectedDays.length===0){showToast('Wähle mindestens einen Tag','error');return;}
  
  const d=getData();
  const id=editingId||'h_'+Date.now();
  
  let habit={id,name,emoji:selectedEmoji,color:selectedColor,type:modalType,days:[...selectedDays].sort()};
  
  if(modalType==='sets'){
    habit.reps=parseInt(document.getElementById('f-reps')?.value)||10;
    habit.sets=parseInt(document.getElementById('f-sets')?.value)||3;
    habit.pause=parseInt(document.getElementById('f-pause')?.value)||60;
    habit.weight=parseFloat(document.getElementById('f-weight')?.value)||0;
  } else if(modalType==='quantity'){
    habit.target=parseInt(document.getElementById('f-target')?.value)||1;
    habit.step=parseInt(document.getElementById('f-step')?.value)||1;
    habit.unit=document.getElementById('f-unit')?.value||'';
  } else if(modalType==='water'){
    habit.cups=parseInt(document.getElementById('f-cups')?.value)||8;
    habit.mlPerCup=parseInt(document.getElementById('f-ml')?.value)||250;
    habit.remindMin=parseInt(document.getElementById('f-remind')?.value)||0;
  } else {
    habit.note=document.getElementById('f-note')?.value||'';
  }
  
  if(editingId){
    const idx=d.habits.findIndex(h=>h.id===editingId);
    if(idx>=0)d.habits[idx]=habit;
  } else {
    d.habits.push(habit);
  }
  saveData(d);
  closeModal();
  buildDayTabs();
  renderHome();
  showToast(editingId?'Habit aktualisiert ✓':'Habit hinzugefügt ✓','success');
}

function deleteHabit(){
  if(!editingId) return;
  if(!confirm('Diesen Habit wirklich löschen? Alle Daten werden gelöscht.')) return;
  const d=getData();
  d.habits=d.habits.filter(h=>h.id!==editingId);
  // Clean up completions
  Object.keys(d.completions).forEach(ds=>{delete d.completions[ds][editingId]});
  Object.keys(d.sets).forEach(k=>{if(k.includes(editingId))delete d.sets[k]});
  Object.keys(d.qty).forEach(k=>{if(k.includes(editingId))delete d.qty[k]});
  Object.keys(d.water).forEach(k=>{if(k.includes(editingId))delete d.water[k]});
  saveData(d);
  closeModal();
  buildDayTabs();
  renderHome();
  showToast('Habit gelöscht');
}

function statsNav(dir){
  statsDayOffset+=dir;
  if(statsDayOffset>6) statsDayOffset=6;
  if(statsDayOffset<-28) statsDayOffset=-28;
  renderStats();
}

function renderStats(){
  const d=getData();
  const today=getDayOfWeek(todayStr());
  
  // Weekly completion
  let weekTotal=0, weekDone=0;
  for(let i=0;i<7;i++){
    const off=i-today;
    const ds=dateStr_(off);
    const dayHabits=d.habits.filter(h=>h.days.includes(i));
    weekTotal+=dayHabits.length;
    weekDone+=dayHabits.filter(h=>isCompleted(h,ds,d)).length;
  }
  const weekPct=weekTotal>0?Math.round(weekDone/weekTotal*100):0;
  
  // Best streak
  const streak=getStreak(d);
  
  // Total completed today
  const todayHabits=d.habits.filter(h=>h.days.includes(today));
  const todayDone=todayHabits.filter(h=>isCompleted(h,todayStr(),d)).length;
  
  // Total habits
  const totalHabits=d.habits.length;

  const statsEl=document.getElementById('stats-content');
  
  let html=`<div class="stats-grid">
    <div class="stat-card accent"><div class="stat-val">${weekPct}%</div><div class="stat-lbl">Diese Woche</div></div>
    <div class="stat-card amber"><div class="stat-val">${streak}</div><div class="stat-lbl">${svgIcon('flame','sm')} Streak Tage</div></div>
    <div class="stat-card green"><div class="stat-val">${todayDone}/${todayHabits.length}</div><div class="stat-lbl">Heute erledigt</div></div>
    <div class="stat-card"><div class="stat-val">${totalHabits}</div><div class="stat-lbl">Habits gesamt</div></div>
  </div>`;
  
  // Weekly bar chart
  html+=`<div class="week-chart"><h3>Wochenübersicht</h3><div class="week-bars">`;
  for(let i=0;i<7;i++){
    const off=i-today;
    const ds=dateStr_(off);
    const dayHabits=d.habits.filter(h=>h.days.includes(i));
    const pct=dayHabits.length>0?Math.round(d.habits.filter(h=>h.days.includes(i)&&isCompleted(h,ds,d)).length/dayHabits.length*100):0;
    const isTodayCol=i===today;
    let barColor='var(--bg3)';
    if(pct>0&&pct<25) barColor='var(--accent)';
    else if(pct>=25&&pct<50) barColor='var(--accent2)';
    else if(pct>=50&&pct<75) barColor='#818CF8';
    else if(pct>=75&&pct<100) barColor='var(--green)';
    else if(pct>=100) barColor='var(--green2)';
    html+=`<div class="week-bar-col${isTodayCol?' today':''}">
      <div class="week-bar-pct">${dayHabits.length>0?pct+'%':''}</div>
      <div class="week-bar-track"><div class="week-bar-fill" style="height:${pct}%;background:${barColor}"></div></div>
      <div class="week-bar-label">${DAYS_SHORT[i]}</div>
    </div>`;
  }
  html+='</div></div>';
  
  // Per-habit stats (single day view with arrows)
  const statsDay = today + statsDayOffset;
  const statsDayStr = dateStr_(statsDayOffset);
  const statsDayDate = new Date(statsDayStr+'T12:00:00');
  const isToday = statsDayOffset===0;
  const dayLabel = isToday?'Heute':DAYS_FULL[(statsDay%7+7)%7];
  const dayDate = statsDayDate.toLocaleDateString('de-AT',{day:'numeric',month:'short'});

  html+=`<div class="habit-stats-list">`;
  html+=`<div class="stats-day-nav">
    <div class="day-nav-btn flip" onclick="statsNav(-1)">${svgIcon('chevron-right','sm')}</div>
    <div class="day-nav-label">${dayLabel}<small>${dayDate}</small></div>
    <div class="day-nav-btn" onclick="statsNav(1)">${svgIcon('chevron-right','sm')}</div>
  </div>`;

  const dayHabits = d.habits.filter(h=>h.days.includes((statsDay%7+7)%7));
  if(dayHabits.length===0){
    html+=`<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">Keine Habits für diesen Tag</div>`;
  } else {
    dayHabits.forEach(h=>{
      const done = isCompleted(h,statsDayStr,d);
      const pct = done?100:0;
      let detail='';
      if(h.type==='sets'){
        const key=`${statsDayStr}_${h.id}`;
        const arr=d.sets[key]||Array(h.sets||3).fill(false);
        const sc=arr.filter(Boolean).length;
        detail=`${sc}/${h.sets||3} Sets`;
      } else if(h.type==='water'){
        const key=`${statsDayStr}_${h.id}`;
        const c=d.water[key]||0;
        detail=`${c}/${h.cups||8} Gläser`;
      } else if(h.type==='quantity'){
        const key=`${statsDayStr}_${h.id}`;
        const c=d.qty[key]||0;
        detail=`${c}/${h.target||1} ${h.unit||''}`;
      }
      html+=`<div class="habit-stat-row">
        <div class="habit-stat-icon" style="background:${h.color}22;color:${h.color}">${svgIcon(h.emoji)}</div>
        <div class="habit-stat-info">
          <div class="habit-stat-name">${h.name}${detail?' · '+detail:''}</div>
          <div class="habit-stat-bar"><div class="habit-stat-bar-fill" style="width:${pct}%;background:${done?'var(--green)':h.color}"></div></div>
        </div>
        <div class="habit-stat-pct" style="color:${done?'var(--green)':'var(--text3)'}">${done?svgIcon('check','sm'):'–'}</div>
      </div>`;
    });
  }
  html+='</div>';
  
  // Badges
  html+=`<div class="habit-stats-list"><h3>Badges (${d.badges.length}/${BADGE_KEYS.length})</h3><div class="badge-grid">`;
  BADGE_KEYS.forEach(key=>{
    const b=BADGES[key];
    const unlocked=d.badges.includes(key);
    html+=`<div class="badge-item${unlocked?' unlocked':' locked'}">
      <div class="badge-icon">${svgIcon(b.icon.replace('ic-',''))}</div>
      <div class="badge-name">${b.name}</div>
      ${unlocked?'':`<div class="badge-lock-overlay">${svgIcon('lock','sm')}</div>`}
    </div>`;
  });
  html+='</div></div>';
  
  statsEl.innerHTML=html;
}

function getStreak(d){
  const today=getDayOfWeek(todayStr());
  let streak=0;
  for(let offset=0;offset>=-30;offset--){
    const ds=dateStr_(offset);
    const dow=(today+(offset%7)+70)%7;
    const dayHabits=d.habits.filter(h=>h.days.includes(dow));
    if(dayHabits.length===0){if(offset===0)continue;break;}
    const allDone=dayHabits.every(h=>isCompleted(h,ds,d));
    if(!allDone) break;
    streak++;
  }
  return streak;
}

  return n;
}

function exportData(){
  const d=getData();
  const json=JSON.stringify(d,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`habbit-backup-${todayStr()}.json`;a.click();
  URL.revokeObjectURL(url);
  showToast('Export erfolgreich ✓','success');
}

function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const imported=JSON.parse(ev.target.result);
        if(!imported.habits)throw new Error('Ungültig');
        if(confirm('Aktuelle Daten werden ersetzt. Fortfahren?')){
          localStorage.setItem('habbit_data',JSON.stringify(imported));
          buildDayTabs();renderHome();renderSettings();
          showToast('Import erfolgreich ✓','success');
        }
      }catch{showToast('Ungültige Datei','error');}
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetAll(){
  if(confirm('Wirklich ALLE Daten löschen? Diese Aktion kann nicht rückgängig gemacht werden.')){
    localStorage.removeItem('habbit_data');
    buildDayTabs();renderHome();renderSettings();
    showToast('Alle Daten gelöscht');
  }
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type=''){
  const t=document.getElementById('toast');
  t.innerHTML=msg;
  t.className='toast'+(type?' '+type:'');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
function spawnConfetti(){
  const colors=['#4F46E5','#22C55E','#F59E0B','#EC4899','#06B6D4'];
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}%;top:20%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*.4}s;animation-duration:${.8+Math.random()*.6}s;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;border-radius:${Math.random()>0.5?'50%':'3px'}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1800);
  }
}
