<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        dark: '#0f172a',
                        card: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-dark text-slate-200 font-sans antialiased min-h-screen flex justify-center">

    <!-- Mobile Container -->
    <div class="w-full max-w-md bg-dark min-h-screen relative pb-24">
        
        <!-- Header -->
        <header class="p-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-white">My Habits</h1>
                <p class="text-sm text-slate-400" id="currentDate">Friday, June 5</p>
            </div>
            <button class="w-10 h-10 rounded-full bg-card flex items-center justify-center text-slate-400 hover:text-white transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
                </svg>
            </button>
        </header>

        <!-- Stats Overview -->
        <div class="px-6 grid grid-cols-3 gap-3 mb-8">
            <div class="bg-card p-3 rounded-2xl text-center">
                <p class="text-2xl font-bold text-white" id="completedCount">2</p>
                <p class="text-xs text-slate-400">Done Today</p>
            </div>
            <div class="bg-card p-3 rounded-2xl text-center">
                <p class="text-2xl font-bold text-orange-500">12</p>
                <p class="text-xs text-slate-400">Best Streak</p>
            </div>
            <div class="bg-card p-3 rounded-2xl text-center">
                <p class="text-2xl font-bold text-primary">85%</p>
                <p class="text-xs text-slate-400">Rate</p>
            </div>
        </div>

        <!-- Weekly Progress (Mini Heatmap) -->
        <div class="px-6 mb-8">
            <h2 class="text-sm font-semibold text-slate-400 mb-3 uppercase tracking-wider">This Week</h2>
            <div class="flex justify-between bg-card p-4 rounded-2xl">
                <div class="flex flex-col items-center gap-2"><span class="text-xs text-slate-500">M</span><div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-xs font-bold text-white">100%</div></div>
                <div class="flex flex-col items-center gap-2"><span class="text-xs text-slate-500">T</span><div class="w-8 h-8 rounded-lg bg-primary/80 flex items-center justify-center text-xs font-bold text-white">80%</div></div>
                <div class="flex flex-col items-center gap-2"><span class="text-xs text-slate-500">W</span><div class="w-8 h-8 rounded-lg bg-primary/60 flex items-center justify-center text-xs font-bold text-white">60%</div></div>
                <div class="flex flex-col items-center gap-2"><span class="text-xs text-slate-500">T</span><div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-xs font-bold text-white">100%</div></div>
                <div class="flex flex-col items-center gap-2"><span class="text-xs text-slate-500">F</span><div class="w-8 h-8 rounded-lg bg-slate-700 flex items-center justify-center text-xs font-bold text-slate-400">0%</div></div>
                <div class="flex flex-col items-center gap-2"><span class="text-xs text-slate-500">S</span><div class="w-8 h-8 rounded-lg bg-slate-700 flex items-center justify-center text-xs font-bold text-slate-400">-</div></div>
                <div class="flex flex-col items-center gap-2"><span class="text-xs text-slate-500">S</span><div class="w-8 h-8 rounded-lg bg-slate-700 flex items-center justify-center text-xs font-bold text-slate-400">-</div></div>
            </div>
        </div>

        <!-- Habit List -->
        <div class="px-6 space-y-4" id="habitList">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Today's Focus</h2>
            
            <!-- Habit Item 1 -->
            <div class="habit-item bg-card p-4 rounded-2xl flex items-center justify-between border border-transparent hover:border-primary/30 transition">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl bg-blue-500/20 text-blue-400 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                    </div>
                    <div>
                        <h3 class="font-medium text-white">Morning Run</h3>
                        <p class="text-xs text-slate-400">Health &bull; 5 day streak</p>
                    </div>
                </div>
                <button onclick="toggleHabit(this)" class="w-8 h-8 rounded-full border-2 border-slate-600 flex items-center justify-center text-transparent hover:border-primary transition check-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
                </button>
            </div>

            <!-- Habit Item 2 -->
            <div class="habit-item bg-card p-4 rounded-2xl flex items-center justify-between border border-transparent hover:border-primary/30 transition">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl bg-purple-500/20 text-purple-400 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" /></svg>
                    </div>
                    <div>
                        <h3 class="font-medium text-white">Read 30 mins</h3>
                        <p class="text-xs text-slate-400">Learning &bull; 12 day streak</p>
                    </div>
                </div>
                <button onclick="toggleHabit(this)" class="w-8 h-8 rounded-full border-2 border-slate-600 flex items-center justify-center text-transparent hover:border-primary transition check-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
                </button>
            </div>

            <!-- Habit Item 3 (Completed) -->
            <div class="habit-item bg-card p-4 rounded-2xl flex items-center justify-between border border-transparent hover:border-primary/30 transition opacity-60">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl bg-green-500/20 text-green-400 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z" /></svg>
                    </div>
                    <div>
                        <h3 class="font-medium text-white line-through">Drink 2L Water</h3>
                        <p class="text-xs text-slate-400">Health &bull; 3 day streak</p>
                    </div>
                </div>
                <button onclick="toggleHabit(this)" class="w-8 h-8 rounded-full bg-green-500 border-2 border-green-500 flex items-center justify-center text-white transition check-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
                </button>
            </div>
        </div>

        <!-- Floating Action Button -->
        <button class="fixed bottom-24 right-6 w-14 h-14 bg-primary rounded-full shadow-lg shadow-primary/40 flex items-center justify-center text-white hover:scale-105 transition z-10">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        </button>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 w-full max-w-md bg-card/90 backdrop-blur-md border-t border-slate-800 flex justify-around py-4 z-20">
            <button class="flex flex-col items-center text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path fill-rule="evenodd" d="M11.078 2.25c-.917 0-1.699.663-1.85 1.567L9.05 4.889c-.02.12-.115.26-.297.348a7.493 7.493 0 00-.986.57c-.166.115-.334.126-.45.083L6.3 5.508a1.875 1.875 0 00-2.282.819l-.922 1.597a1.875 1.875 0 00.432 2.385l.84.692c.095.078.17.229.154.43a7.598 7.598 0 000 1.139c.015.2-.059.352-.153.43l-.841.692a1.875 1.875 0 00-.432 2.385l.922 1.597a1.875 1.875 0 002.282.818l1.019-.382c.115-.043.283-.031.45.082.312.214.641.405.985.57.182.088.277.228.297.35l.178 1.071c.151.904.933 1.567 1.85 1.567h1.844c.916 0 1.699-.663 1.85-1.567l.178-1.072c.02-.12.114-.26.297-.349.344-.165.673-.356.985-.57.167-.114.335-.125.45-.082l1.02.382a1.875 1.875 0 002.28-.819l.923-1.597a1.875 1.875 0 00-.432-2.385l-.84-.692c-.095-.078-.17-.229-.154-.43a7.614 7.614 0 000-1.139c-.016-.2.059-.352.153-.43l.84-.692c.708-.582.891-1.59.433-2.385l-.922-1.597a1.875 1.875 0 00-2.282-.818l-1.02.382c-.114.043-.282.031-.449-.083a7.49 7.49 0 00-.985-.57c-.183-.087-.277-.227-.297-.348l-.179-1.072a1.875 1.875 0 00-1.85-1.567h-1.843zM12 15.75a3.75 3.75 0 100-7.5 3.75 3.75 0 000 7.5z" clip-rule="evenodd" /></svg>
                <span class="text-[10px] font-medium mt-1">Habits</span>
            </button>
            <button class="flex flex-col items-center text-slate-500 hover:text-slate-300 transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" /></svg>
                <span class="text-[10px] font-medium mt-1">Stats</span>
            </button>
            <button class="flex flex-col items-center text-slate-500 hover:text-slate-300 transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.212 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                <span class="text-[10px] font-medium mt-1">Settings</span>
            </button>
        </nav>
    </div>

    <script>
        // Simple logic to toggle habits and update counter
        function toggleHabit(btn) {
            const habitItem = btn.closest('.habit-item');
            const title = habitItem.querySelector('h3');
            const isCompleted = btn.classList.contains('bg-green-500');
            const counter = document.getElementById('completedCount');
            let count = parseInt(counter.innerText);

            if (isCompleted) {
                // Uncheck
                btn.classList.remove('bg-green-500', 'border-green-500', 'text-white');
                btn.classList.add('border-slate-600', 'text-transparent');
                habitItem.classList.remove('opacity-60');
                title.classList.remove('line-through');
                counter.innerText = count - 1;
            } else {
                // Check
                btn.classList.add('bg-green-500', 'border-green-500', 'text-white');
                btn.classList.remove('border-slate-600', 'text-transparent');
                habitItem.classList.add('opacity-60');
                title.classList.add('line-through');
                counter.innerText = count + 1;
            }
        }
    </script>
</body>
</html>
